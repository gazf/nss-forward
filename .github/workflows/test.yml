name: Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

jobs:
  test-c:
    name: C tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test

  test-deno:
    name: Deno tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check
      - run: deno lint
      - run: deno check server/*.ts test/*.ts
      - run: deno test --allow-net --allow-env test/*.ts
